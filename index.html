<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>JomOutKL — KL Daily Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#FFF3EE;--card:#fff;--warm:#FFF8F2;--border:rgba(0,0,0,0.07);--orange:#FF6535;--od:#C94410;--amber:#F4A800;--peach:#FFD8C4;--peach2:#FFE8D8;--sg1:#FF8C00;--sg2:#F4C842;--text:#1a1a1a;--t2:#3d3d3d;--muted:#888;--muted2:#aaa;--green:#2d9e5c;--red:#e53e3e;--purple:#7c5cbf;--blue:#3b82f6;--sh:0 2px 12px rgba(0,0,0,0.07);--sh2:0 1px 5px rgba(0,0,0,0.05);}
body.morning{--bg-grad:linear-gradient(180deg,#FFE8CC 0%,#FFF3EE 40%);}
body.afternoon{--bg-grad:linear-gradient(180deg,#FFDDB3 0%,#FFF3EE 35%);}
body.evening{--bg-grad:linear-gradient(180deg,#FF9A5C 0%,#FFD4AA 20%,#FFF3EE 50%);}
body.night{--bg-grad:linear-gradient(180deg,#2D1B4E 0%,#4A2060 15%,#FFF3EE 55%);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg-grad,var(--bg));color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;max-width:480px;margin:0 auto;min-height:100vh;transition:background 1.5s ease;}
.hdr{padding:14px 16px 8px;position:sticky;top:0;z-index:60;}
.hdr-inner{background:rgba(255,243,238,0.92);backdrop-filter:blur(14px);border-radius:16px;padding:10px 14px 8px;box-shadow:0 2px 12px rgba(255,101,53,0.08);border:1px solid rgba(255,101,53,0.1);}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;}
.logo{font-size:1.5rem;font-weight:700;line-height:1;display:flex;align-items:baseline;}
.logo .out{color:var(--orange);}
.logo .kl{font-size:.92rem;font-weight:500;color:var(--t2);margin-left:3px;}
.demo-badge{display:inline-flex;align-items:center;gap:3px;margin-left:7px;background:var(--warm);border:1px solid var(--peach);border-radius:20px;padding:2px 8px;font-size:.6rem;font-weight:700;color:var(--amber);}
.demo-badge::before{content:'●';font-size:.42rem;}
.live-badge{display:none;align-items:center;gap:3px;margin-left:7px;background:#e6fff0;border:1px solid rgba(45,158,92,.25);border-radius:20px;padding:2px 8px;font-size:.6rem;font-weight:700;color:var(--green);}
.live-badge::before{content:'●';font-size:.42rem;}
.hdr-date{font-size:.72rem;color:var(--muted);margin-top:2px;}
.hdr-actions{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.moon-btn{width:34px;height:34px;border-radius:50%;background:var(--warm);border:1.5px solid var(--peach);display:flex;align-items:center;justify-content:center;font-size:.95rem;cursor:pointer;}
.ai-btn{background:var(--orange);color:#fff;border:none;padding:7px 13px;border-radius:22px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.78rem;cursor:pointer;}
.tabs-outer{padding:0 16px;overflow-x:auto;scrollbar-width:none;position:sticky;top:84px;z-index:50;}
.tabs-outer::-webkit-scrollbar{display:none;}
.tabs-inner{background:rgba(255,243,238,.92);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(255,101,53,.1);display:flex;gap:2px;padding:7px 0;white-space:nowrap;overflow-x:auto;}
.tab{display:inline-flex;align-items:center;gap:4px;font-size:.78rem;font-weight:500;padding:6px 12px;border-radius:22px;cursor:pointer;border:1.5px solid transparent;color:var(--t2);background:transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.tab.active{background:var(--orange);color:#fff;border-color:var(--orange);}
.page{display:none;padding:12px 16px 140px;}
.page.active{display:block;}
.score-card{background:linear-gradient(135deg,var(--sg1),var(--sg2));border-radius:20px;padding:22px 20px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(255,140,0,.22);}
.score-weather-emoji{position:absolute;right:16px;top:12px;font-size:3.5rem;}
.score-num{font-size:5rem;font-weight:800;color:#fff;line-height:1;letter-spacing:-2px;}
